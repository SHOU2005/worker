<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>You're offline · Switch</title>
  <style>
    html,body{margin:0;padding:0;background:#000;color:#fff;font-family:"DM Sans","system-ui",sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
    .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;gap:20px}
    .dot{width:14px;height:14px;border-radius:50%;background:#EF4444;box-shadow:0 0 0 6px rgba(239,68,68,.15)}
    h1{font-size:24px;font-weight:900;margin:0;letter-spacing:-.5px}
    p{margin:0;color:rgba(255,255,255,.6);line-height:1.5;max-width:300px;font-size:15px}
    button{margin-top:8px;padding:14px 28px;border-radius:14px;border:none;background:#fff;color:#000;font-size:15px;font-weight:800;letter-spacing:-.2px;cursor:pointer}
    .small{font-size:12px;color:rgba(255,255,255,.35);margin-top:24px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="dot" aria-hidden="true"></div>
    <h1>You're offline</h1>
    <p>Switch couldn't reach the server. Check your connection and try again — your session is still active.</p>
    <button onclick="location.reload()">Retry</button>
    <div class="small">Tip: this only happens when your phone briefly loses signal. Pull-to-refresh once you're back online.</div>
  </div>
</body>
</html>
