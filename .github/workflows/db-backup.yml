name: Nightly DB backup → S3

on:
  schedule:
    # Daily at 20:30 UTC = 02:00 IST. Adjust if you want a different window.
    - cron: '30 20 * * *'
  workflow_dispatch:           # allows manual "Run workflow" from the Actions tab
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # All values come from GitHub repo Settings → Secrets and variables → Actions
      DATABASE_URL:           ${{ secrets.BACKUP_DATABASE_URL }}
      S3_BUCKET:              ${{ secrets.BACKUP_S3_BUCKET }}
      S3_PREFIX:              ${{ vars.BACKUP_S3_PREFIX || 'switch/db' }}
      S3_ENDPOINT:            ${{ vars.BACKUP_S3_ENDPOINT }}        # optional: only set for R2/B2/MinIO
      AWS_ACCESS_KEY_ID:      ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:  ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:     ${{ vars.BACKUP_AWS_REGION || 'auto' }}

    steps:
      - name: Validate secrets
        run: |
          for v in DATABASE_URL S3_BUCKET AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v" >&2
              exit 1
            fi
          done
          echo "All required secrets present."

      - name: Install Postgres client (matches Supabase v15)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq
          sudo apt-get install -yqq postgresql-client-15
          pg_dump --version

      - name: Dump database
        run: |
          set -euo pipefail
          STAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          FILE="switch-${STAMP}.sql.gz"
          echo "Writing $FILE …"

          # --no-owner --no-acl makes the dump portable. --clean --if-exists makes restore idempotent.
          pg_dump "$DATABASE_URL" \
            --no-owner --no-acl \
            --clean --if-exists \
            --format=plain \
            | gzip -9 > "$FILE"

          ls -lh "$FILE"
          # Sanity-check: file must be > 1 KB (an empty/error dump would be tiny)
          MIN_SIZE=1024
          ACTUAL=$(stat -c%s "$FILE")
          if [ "$ACTUAL" -lt "$MIN_SIZE" ]; then
            echo "::error::Dump is suspiciously small ($ACTUAL bytes). Aborting upload." >&2
            exit 1
          fi
          echo "DUMP_FILE=$FILE" >> "$GITHUB_ENV"

      - name: Upload to S3
        run: |
          set -euo pipefail
          KEY="$S3_PREFIX/$DUMP_FILE"
          if [ -n "${S3_ENDPOINT:-}" ]; then
            aws s3 cp "$DUMP_FILE" "s3://$S3_BUCKET/$KEY" --endpoint-url "$S3_ENDPOINT"
          else
            aws s3 cp "$DUMP_FILE" "s3://$S3_BUCKET/$KEY"
          fi
          echo "Uploaded: s3://$S3_BUCKET/$KEY"

      - name: Prune backups older than 30 days
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%d)
          if [ -n "${S3_ENDPOINT:-}" ]; then
            EP="--endpoint-url $S3_ENDPOINT"
          else
            EP=""
          fi
          aws s3 ls "s3://$S3_BUCKET/$S3_PREFIX/" $EP | awk '{print $4}' | while read -r name; do
            [ -z "$name" ] && continue
            # Filenames look like switch-2026-05-07T20-30-00Z.sql.gz; extract the date part
            file_date=$(echo "$name" | sed -E 's/^switch-([0-9]{4}-[0-9]{2}-[0-9]{2}).*/\1/')
            if [[ "$file_date" < "$CUTOFF" ]]; then
              echo "Deleting old backup: $name"
              aws s3 rm "s3://$S3_BUCKET/$S3_PREFIX/$name" $EP || true
            fi
          done

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Backup failed. Check logs and verify secrets."
          # Hook this up to Slack/email later — see workflow comments below.
